apiVersion: apps/v1
kind: Deployment
metadata:
  name: lovable-frontend
  namespace: lovable-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lovable-frontend
  template:
    metadata:
      labels:
        app: lovable-frontend
    spec:
      containers:
        - name: lovable-frontend
          image: harishpalaspagar/lovable-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: lovable-frontend
  namespace: lovable-core
spec:
  type: ClusterIP
  selector:
    app: lovable-frontend
  ports:
    - port: 80
      targetPort: 80
